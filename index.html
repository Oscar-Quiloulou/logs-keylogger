<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès secret</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #222;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px #0f0;
        }

        input[type="password"] {
            padding: 8px;
            margin-right: 10px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        .message {
            margin-top: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Zone ultra secrète 🕶️</h2>
        <p>Entre le mot de passe :</p>
        <input type="password" id="passwordInput" placeholder="Mot de passe">
        <button onclick="checkPassword()">Valider</button>
        <div class="message" id="message"></div>
    </div>

    <script>
        // Mot de passe "au hasard" choisi par moi
        const CORRECT_PASSWORD = "482917";

        function checkPassword() {
            const input = document.getElementById("passwordInput");
            const message = document.getElementById("message");
            const entered = input.value;

            // On reset la couleur de fond au cas où
            document.body.style.backgroundColor = "#111";

            if (entered === CORRECT_PASSWORD) {
                // Mot de passe correct -> on redirige vers la page verte
                window.location.href = "success.html";
            } else {
                // Mot de passe faux -> fond rouge
                document.body.style.backgroundColor = "red";
                message.textContent = "Mot de passe incorrect 🚫";
            }
        }

        // Exemple : pré-remplir l'input (tu peux enlever si tu veux)
        // document.getElementById("passwordInput").value = "test";
    </script>
</body>
</html>
