<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès secret</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #222;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px #0f0;
        }

        input[type="password"] {
            padding: 8px;
            margin-right: 10px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        .message {
            margin-top: 10px;
            min-height: 20px;
            color: red;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Zone ultra secrète 🕶️</h2>
        <p>Entre le mot de passe :</p>

        <input type="password" id="passwordInput" placeholder="Mot de passe">
        <button onclick="sendPassword()">Valider</button>

        <div class="message" id="message"></div>
    </div>

    <script>
        const BACKEND_URL = "https://glorious-waffle-5gx5v6pprj6vc4xgv-8000.app.github.dev";

        async function sendPassword() {
            const message = document.getElementById("message");
            const pwd = document.getElementById("passwordInput").value;

            message.textContent = "Chargement...";

            try {
                const formData = new FormData();
                formData.append("password", pwd);

                const loginReq = await fetch(`${BACKEND_URL}/login.php`, {
                    method: "POST",
                    body: formData
                });

                const result = await loginReq.text();

                if (result === "OK") {
                    window.location.href = "success.html";
                } else {
                    message.textContent = "Mot de passe incorrect 🚫";
                }

            } catch (err) {
                message.textContent = "Erreur de connexion au serveur";
            }
        }
    </script>

</body>
</html>
